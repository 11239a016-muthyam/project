<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>SCSVMV Admin | Dashboard</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div class="admin-layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <img src="../assets/images/logo.png" alt="Logo" style="height:40px;margin-bottom:.5rem">
      <h2>SCSVMV <span>Admin</span></h2>
    </div>
    <ul class="sidebar-menu">
      <li><a href="dashboard.html" class="active"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
      <li><a href="manage-events.html"><i class="fas fa-calendar-alt"></i> Manage Events</a></li>
      <li><a href="add-event.html"><i class="fas fa-plus-circle"></i> Add Event</a></li>
      <li><a href="../participants.html"><i class="fas fa-users"></i> Participants</a></li>
      <li><a href="../feedback.html"><i class="fas fa-star"></i> Feedback</a></li>
      <li><a href="#" onclick="exportAll()"><i class="fas fa-download"></i> Export All CSV</a></li>
      <li><a href="#" onclick="if(confirm('Reset all data to defaults?'))DB.reset();location.reload()"><i class="fas fa-undo"></i> Reset Data</a></li>
      <li><a href="../index.html"><i class="fas fa-home"></i> Back to Site</a></li>
    </ul>
  </aside>

  <!-- Main -->
  <main class="admin-main">
    <div class="admin-header">
      <h1><i class="fas fa-tachometer-alt" style="color:#FF6B2B"></i> Dashboard</h1>
      <div style="display:flex;gap:.8rem">
        <button class="btn btn-outline btn-sm" onclick="exportAll()"><i class="fas fa-download"></i> Export All</button>
        <a href="add-event.html" class="btn btn-primary btn-sm"><i class="fas fa-plus"></i> Add Event</a>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-row" id="statsRow"></div>

    <!-- Pending approvals -->
    <div style="margin-bottom:2rem">
      <h3 style="color:#1565C0;margin-bottom:1rem"><i class="fas fa-hourglass-half" style="color:#FF6B2B"></i> Pending Approvals</h3>
      <div id="pendingList"></div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:2rem">
      <!-- Recent registrations -->
      <div>
        <h3 style="color:#1565C0;margin-bottom:1rem"><i class="fas fa-user-plus" style="color:#FF6B2B"></i> Recent Registrations</h3>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Name</th><th>Type</th><th>Event</th><th>Date</th></tr></thead>
            <tbody id="recentParts"></tbody>
          </table>
        </div>
      </div>
      <!-- Recent feedback -->
      <div>
        <h3 style="color:#1565C0;margin-bottom:1rem"><i class="fas fa-star" style="color:#f59e0b"></i> Recent Reviews</h3>
        <div id="recentFeedback"></div>
      </div>
    </div>
  </main>
</div>

<div class="toast"></div>
<script src="../js/db.js"></script><script src="../js/script.js"></script>
<script>
document.addEventListener('DOMContentLoaded',()=>{
  const s=DB.stats();
  const events=DB.getAll('events');
  document.getElementById('statsRow').innerHTML=`
    <div class="stat-card"><div class="num">${s.totalEvents}</div><div class="lbl">Total Events</div></div>
    <div class="stat-card"><div class="num">${s.upcoming}</div><div class="lbl">Upcoming</div></div>
    <div class="stat-card blue"><div class="num">${s.completed}</div><div class="lbl">Completed</div></div>
    <div class="stat-card" style="border-top-color:#dc2626"><div class="num" style="color:#dc2626">${s.pending}</div><div class="lbl">Pending</div></div>
    <div class="stat-card"><div class="num">${s.totalParts}</div><div class="lbl">Participants</div></div>
    <div class="stat-card blue"><div class="num">${s.avgRating}</div><div class="lbl">Avg Rating</div></div>`;

  // Pending
  const pending=events.filter(e=>e.approved==='false');
  document.getElementById('pendingList').innerHTML=pending.length
    ? pending.map(ev=>`
      <div class="notif-card" style="border-left:4px solid #f59e0b;margin-bottom:.8rem">
        <div class="notif-icon" style="background:#fef9c3;color:#b45309"><i class="fas fa-calendar"></i></div>
        <div style="flex:1">
          <h4 style="color:#1565C0">${ev.title}</h4>
          <div style="font-size:.85rem;color:#6b7280">${ev.category} | ${fmtDate(ev.date)} | By: ${ev.organizer_name} (${ev.organizer_type})</div>
        </div>
        <div style="display:flex;gap:.5rem">
          <button class="btn btn-success btn-sm" onclick="approve('${ev.id}')"><i class="fas fa-check"></i> Approve</button>
          <button class="btn btn-danger btn-sm" onclick="reject('${ev.id}')"><i class="fas fa-times"></i> Reject</button>
        </div>
      </div>`).join('')
    : '<div class="alert alert-success"><i class="fas fa-check-circle"></i> No pending approvals!</div>';

  // Recent participants
  const parts=DB.getAll('participants').slice(-5).reverse();
  const evMap={}; events.forEach(e=>evMap[e.id]=e.title);
  document.getElementById('recentParts').innerHTML=parts.map(p=>`
    <tr><td>${p.name}</td><td><span class="badge badge-${p.user_type==='student'?'orange':'blue'}">${p.user_type}</span></td>
    <td style="font-size:.82rem">${(evMap[p.event_id]||'').slice(0,25)}…</td>
    <td style="font-size:.82rem">${fmtDate(p.registration_date)}</td></tr>`).join('');

  // Recent feedback
  const fbks=DB.getAll('feedback').slice(-3).reverse();
  document.getElementById('recentFeedback').innerHTML=fbks.map(f=>`
    <div class="review-card" style="margin-bottom:.8rem">
      <div class="review-header">
        <span class="reviewer">${f.participant_name}</span>
        <div>${starHTML(Number(f.rating))}</div>
      </div>
      <div class="review-title">${f.title}</div>
      <div class="review-text">${f.review.slice(0,100)}…</div>
    </div>`).join('');
});

function approve(id){
  DB.update('events','id',id,{approved:'true'});
  showToast('Event approved!','success'); location.reload();
}
function reject(id){
  DB.remove('events','id',id);
  showToast('Event removed','error'); location.reload();
}
function exportAll(){
  ['events','participants','feedback','students','faculty'].forEach((t,i)=>setTimeout(()=>DB.downloadCSV(t),i*500));
  showToast('Downloading all CSV files…','success');
}
</script>
</body></html>
