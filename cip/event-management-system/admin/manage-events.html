<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>SCSVMV Admin | Manage Events</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div class="admin-layout">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <img src="../assets/images/logo.png" alt="Logo" style="height:40px;margin-bottom:.5rem">
      <h2>SCSVMV <span>Admin</span></h2>
    </div>
    <ul class="sidebar-menu">
      <li><a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
      <li><a href="manage-events.html" class="active"><i class="fas fa-calendar-alt"></i> Manage Events</a></li>
      <li><a href="add-event.html"><i class="fas fa-plus-circle"></i> Add Event</a></li>
      <li><a href="../participants.html"><i class="fas fa-users"></i> Participants</a></li>
      <li><a href="../feedback.html"><i class="fas fa-star"></i> Feedback</a></li>
      <li><a href="#" onclick="exportTable('events')"><i class="fas fa-download"></i> Export Events CSV</a></li>
      <li><a href="../index.html"><i class="fas fa-home"></i> Back to Site</a></li>
    </ul>
  </aside>

  <main class="admin-main">
    <div class="admin-header">
      <h1><i class="fas fa-calendar-alt" style="color:#FF6B2B"></i> Manage Events</h1>
      <div style="display:flex;gap:.8rem">
        <button class="btn btn-outline btn-sm" onclick="exportTable('events')"><i class="fas fa-download"></i> Export CSV</button>
        <a href="add-event.html" class="btn btn-primary btn-sm"><i class="fas fa-plus"></i> Add Event</a>
      </div>
    </div>

    <div class="search-filter-bar" style="margin-bottom:1.5rem">
      <div class="search-box"><i class="fas fa-search"></i><input type="text" id="searchInput" placeholder="Search events…"></div>
      <div class="filter-chips">
        <span class="chip active" data-s="all">All</span>
        <span class="chip" data-s="upcoming">Upcoming</span>
        <span class="chip" data-s="completed">Completed</span>
        <span class="chip" data-s="pending">Pending</span>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead><tr><th>Title</th><th>Category</th><th>Date</th><th>Organizer</th><th>Registered</th><th>Status</th><th>Approved</th><th>Actions</th></tr></thead>
        <tbody id="evTbody"></tbody>
      </table>
    </div>
    <div class="empty-state" id="emptyState" style="display:none">
      <i class="fas fa-calendar-times"></i><h3>No events found</h3>
    </div>
  </main>
</div>

<div class="toast"></div>
<script src="../js/db.js"></script><script src="../js/script.js"></script>
<script>
let allEvents=[], activeStatus='all';
document.addEventListener('DOMContentLoaded',()=>{
  allEvents=DB.getAll('events');
  render();
  document.getElementById('searchInput').addEventListener('input',render);
  document.querySelector('.filter-chips').addEventListener('click',e=>{
    if(!e.target.classList.contains('chip'))return;
    document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
    e.target.classList.add('active'); activeStatus=e.target.dataset.s; render();
  });
});

function render(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  let list=allEvents.filter(e=>{
    const matchS=activeStatus==='all'||(activeStatus==='pending'?e.approved==='false':e.status===activeStatus&&e.approved==='true');
    const matchQ=!q||e.title.toLowerCase().includes(q);
    return matchS&&matchQ;
  });
  const tbody=document.getElementById('evTbody');
  const empty=document.getElementById('emptyState');
  if(!list.length){tbody.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  tbody.innerHTML=list.map(ev=>`<tr>
    <td><strong>${ev.title.slice(0,40)}${ev.title.length>40?'…':''}</strong></td>
    <td><span class="badge badge-orange">${ev.category}</span></td>
    <td style="font-size:.85rem;white-space:nowrap">${fmtDate(ev.date)}</td>
    <td style="font-size:.85rem">${ev.organizer_name}<br><span class="badge badge-${ev.organizer_type==='faculty'?'blue':'orange'}">${ev.organizer_type}</span></td>
    <td style="text-align:center">${ev.registered_count}/${ev.max_participants}</td>
    <td><span class="badge badge-${ev.status==='upcoming'?'blue':'green'}">${ev.status}</span></td>
    <td>${ev.approved==='true'?'<span class="badge badge-green">✓ Live</span>':'<span class="badge badge-yellow">⏳ Pending</span>'}</td>
    <td>
      <div style="display:flex;gap:.4rem;flex-wrap:wrap">
        ${ev.approved==='false'?`<button class="btn btn-success btn-sm" onclick="approve('${ev.id}')">Approve</button>`:''}
        <button class="btn btn-sm btn-outline" onclick="toggleStatus('${ev.id}','${ev.status}')">${ev.status==='upcoming'?'Mark Done':'Mark Upcoming'}</button>
        <button class="btn btn-danger btn-sm" onclick="deleteEv('${ev.id}')"><i class="fas fa-trash"></i></button>
      </div>
    </td>
  </tr>`).join('');
}

function approve(id){ DB.update('events','id',id,{approved:'true'}); allEvents=DB.getAll('events'); render(); showToast('Approved!','success'); }
function deleteEv(id){ if(!confirm('Delete this event?'))return; DB.remove('events','id',id); allEvents=DB.getAll('events'); render(); showToast('Deleted','error'); }
function toggleStatus(id,cur){
  DB.update('events','id',id,{status:cur==='upcoming'?'completed':'upcoming'});
  allEvents=DB.getAll('events'); render(); showToast('Status updated','success');
}
</script>
</body></html>
