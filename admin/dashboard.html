<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>SCSVMV Admin | Dashboard</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/auth.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div class="admin-layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <img src="../assets/images/logo.png" alt="Logo">
      <h2>SCSVMV <span>Admin</span></h2>
    </div>
    <ul class="sidebar-menu">
      <li><a href="dashboard.html" class="active"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
      <li><a href="manage-events.html"><i class="fas fa-calendar-alt"></i> Manage Events</a></li>
      <li><a href="add-event.html"><i class="fas fa-plus-circle"></i> Add Event</a></li>
      <li><a href="users.html"><i class="fas fa-users-cog"></i> Users Database</a></li>
      <li><a href="../participants.html"><i class="fas fa-users"></i> Participants</a></li>
      <li><a href="../feedback.html"><i class="fas fa-star"></i> Feedback</a></li>
      <li style="margin-top:1.5rem;border-top:1px solid rgba(255,255,255,.1);padding-top:1rem"><a href="#" onclick="exportAll()"><i class="fas fa-download"></i> Export All CSV</a></li>
      <li><a href="#" onclick="if(confirm('Reset all data to defaults?'))DB.reset();location.reload()"><i class="fas fa-undo"></i> Reset Data</a></li>
      <li><a href="../index.html"><i class="fas fa-home"></i> Back to Site</a></li>
      <li><a href="#" onclick="Auth.logout();window.location.href='../auth.html'" style="color:#ff8a8a"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
    </ul>
  </aside>

  <!-- Main -->
  <main class="admin-main">
    <div class="admin-header">
      <h1><i class="fas fa-tachometer-alt"></i> Dashboard Overview</h1>
      <div style="display:flex;gap:.8rem">
        <button class="btn btn-outline btn-sm" onclick="exportAll()"><i class="fas fa-download"></i> Export Data</button>
        <a href="add-event.html" class="btn btn-primary btn-sm"><i class="fas fa-plus"></i> Add Event</a>
      </div>
    </div>

    <!-- Stats -->
    <div class="admin-stats-row" id="statsRow"></div>

    <!-- Pending approvals -->
    <div style="margin-bottom:2.5rem">
      <h3 style="color:var(--blue);margin-bottom:1rem;font-weight:700;display:flex;align-items:center;gap:.5rem"><i class="fas fa-hourglass-half" style="color:var(--orange)"></i> Pending Approvals</h3>
      <div id="pendingList"></div>
    </div>

    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(400px,1fr));gap:2rem">
      <!-- Recent registrations -->
      <div class="glass-card" style="padding:1.5rem;background:var(--white);border:1px solid var(--border)">
        <h3 style="color:var(--blue);margin-bottom:1rem;font-weight:700;display:flex;align-items:center;gap:.5rem"><i class="fas fa-user-plus" style="color:var(--orange)"></i> Recent Registrations</h3>
        <div class="table-wrap" style="box-shadow:none;border-radius:10px;border:1px solid var(--border)">
          <table>
            <thead><tr><th>Name</th><th>Type</th><th>Event</th><th>Date</th></tr></thead>
            <tbody id="recentParts"></tbody>
          </table>
        </div>
      </div>
      <!-- Recent feedback -->
      <div class="glass-card" style="padding:1.5rem;background:var(--white);border:1px solid var(--border)">
        <h3 style="color:var(--blue);margin-bottom:1rem;font-weight:700;display:flex;align-items:center;gap:.5rem"><i class="fas fa-star" style="color:#f59e0b"></i> Recent Reviews</h3>
        <div id="recentFeedback"></div>
      </div>
    </div>
  </main>
</div>

<div class="toast"></div>
<script src="../js/db.js"></script><script src="../js/auth.js"></script><script src="../js/script.js"></script>
<script>
document.addEventListener('DOMContentLoaded',()=>{
  if (typeof Auth !== 'undefined') Auth.init().then(() => { if(!Auth.requireAdmin()) return; loadDashboard(); });
  else loadDashboard();
});
function loadDashboard(){
  const s=DB.stats();
  const events=DB.getAll('events');
  document.getElementById('statsRow').innerHTML=`
    <div class="admin-stat-card">
      <div class="admin-stat-icon"><i class="fas fa-calendar-check"></i></div>
      <div class="admin-stat-info"><div class="num">${s.totalEvents}</div><div class="lbl">Total Events</div></div>
    </div>
    <div class="admin-stat-card blue">
      <div class="admin-stat-icon"><i class="fas fa-clock"></i></div>
      <div class="admin-stat-info"><div class="num">${s.upcoming}</div><div class="lbl">Upcoming</div></div>
    </div>
    <div class="admin-stat-card green">
      <div class="admin-stat-icon"><i class="fas fa-check-circle"></i></div>
      <div class="admin-stat-info"><div class="num">${s.completed}</div><div class="lbl">Completed</div></div>
    </div>
    <div class="admin-stat-card red">
      <div class="admin-stat-icon"><i class="fas fa-hourglass-half"></i></div>
      <div class="admin-stat-info"><div class="num">${s.pending}</div><div class="lbl">Pending</div></div>
    </div>
    <div class="admin-stat-card">
      <div class="admin-stat-icon"><i class="fas fa-users"></i></div>
      <div class="admin-stat-info"><div class="num">${s.totalParts}</div><div class="lbl">Participants</div></div>
    </div>
    <div class="admin-stat-card blue">
      <div class="admin-stat-icon"><i class="fas fa-star"></i></div>
      <div class="admin-stat-info"><div class="num">${s.avgRating}</div><div class="lbl">Avg Rating</div></div>
    </div>`;

  // Pending
  const pending=events.filter(e=>e.approved==='false');
  document.getElementById('pendingList').innerHTML=pending.length
    ? pending.map(ev=>`
      <div class="notif-card" style="border-left:4px solid #f59e0b;margin-bottom:.8rem;align-items:center">
        <div class="notif-icon" style="background:#fef9c3;color:#b45309;box-shadow:none;border-radius:10px;width:48px;height:48px"><i class="fas fa-calendar-plus"></i></div>
        <div style="flex:1">
          <h4 style="color:var(--blue);font-size:1.05rem;margin-bottom:.2rem">${ev.title}</h4>
          <div style="font-size:.85rem;color:var(--text-light)"><span class="badge badge-orange" style="margin-right:.5rem">${ev.category}</span> ${fmtDate(ev.date)} | By: <strong>${ev.organizer_name}</strong> (${ev.organizer_type})</div>
        </div>
        <div style="display:flex;gap:.6rem;flex-wrap:wrap">
          <button class="btn btn-success btn-sm" style="border-radius:8px" onclick="approve('${ev.id}')"><i class="fas fa-check"></i> Approve</button>
          <button class="btn btn-danger btn-sm" style="border-radius:8px" onclick="reject('${ev.id}')"><i class="fas fa-times"></i> Reject</button>
        </div>
      </div>`).join('')
    : '<div class="alert alert-success" style="border:1px solid #bbf7d0"><i class="fas fa-check-circle" style="font-size:1.2rem"></i> You are all caught up! No pending approvals.</div>';

  // Recent participants
  const parts=DB.getAll('participants').slice(-5).reverse();
  const evMap={}; events.forEach(e=>evMap[e.id]=e.title);
  document.getElementById('recentParts').innerHTML=parts.length ? parts.map(p=>`
    <tr>
      <td><strong>${p.name}</strong></td>
      <td><span class="badge badge-${p.user_type==='student'?'orange':'blue'}">${p.user_type}</span></td>
      <td style="font-size:.85rem;color:var(--text-light)">${(evMap[p.event_id]||'').slice(0,25)}…</td>
      <td style="font-size:.85rem;color:var(--text-light)">${fmtDate(p.registration_date)}</td>
    </tr>`).join('') : '<tr><td colspan="4" style="text-align:center;color:var(--text-light)">No registrations yet</td></tr>';

  // Recent feedback
  const fbks=DB.getAll('feedback').slice(-3).reverse();
  document.getElementById('recentFeedback').innerHTML=fbks.length ? fbks.map(f=>`
    <div class="review-card" style="margin-bottom:.8rem;border:1px solid var(--border);box-shadow:none;border-left:4px solid #f59e0b">
      <div class="review-header">
        <span class="reviewer">${f.participant_name}</span>
        <div style="color:#f59e0b;font-size:.9rem">${starHTML(Number(f.rating))}</div>
      </div>
      <div class="review-title" style="font-size:.95rem">${f.title}</div>
      <div class="review-text" style="font-size:.85rem">${f.review.slice(0,100)}…</div>
      ${f.photos && f.photos.length ? `
      <div style="display:flex;gap:.3rem;margin-top:.6rem">
        ${f.photos.map(p=>`<img src="${p}" style="width:40px;height:40px;object-fit:cover;border-radius:6px;border:1px solid #e5e7eb">`).join('')}
      </div>` : ''}
    </div>`).join('') : '<div style="text-align:center;color:var(--text-light);padding:2rem">No feedback received yet</div>';
}

function approve(id){
  DB.update('events','id',id,{approved:'true'});
  showToast('Event approved!','success'); setTimeout(()=>location.reload(),800);
}
function reject(id){
  DB.remove('events','id',id);
  showToast('Event removed','error'); setTimeout(()=>location.reload(),800);
}
function exportAll(){
  ['events','participants','feedback','students','faculty'].forEach((t,i)=>setTimeout(()=>DB.downloadCSV(t),i*500));
  showToast('Downloading all CSV files…','success');
}
</script>
</body></html>
