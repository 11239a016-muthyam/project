<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>SCSVMV Events | Past Events</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<header>
  <a href="index.html" class="logo-area"><img src="assets/images/logo.png" alt="SCSVMV Logo"><h1>SCSVMV <span>Events</span></h1></a>
  <nav><ul id="navMenu">
    <li><a href="index.html">Home</a></li>
    <li><a href="events.html">Upcoming Events</a></li>
    <li><a href="past-events.html" class="active">Past Events</a></li>
    <li><a href="participants.html">Participants</a></li>
    <li><a href="feedback.html">Feedback</a></li>
    <li><a href="notifications.html">Reminders</a></li>
    <li><a href="create-event.html" class="nav-btn"><i class="fas fa-plus"></i> Create Event</a></li>
  </ul></nav>
  <button class="ham" onclick="document.getElementById('navMenu').classList.toggle('open')"><span></span><span></span><span></span></button>
</header>

<div class="page-banner" style="background:linear-gradient(135deg,#16a34a,#15803d)">
  <h1><i class="fas fa-history"></i> Past Events</h1>
  <p>Browse completed events, view participants and read reviews</p>
</div>

<div class="container">
  <div class="search-filter-bar">
    <div class="search-box"><i class="fas fa-search"></i><input type="text" id="searchInput" placeholder="Search past events…"></div>
  </div>
  <div class="events-grid" id="pastGrid"></div>
  <div class="empty-state" id="emptyState" style="display:none">
    <i class="fas fa-calendar-check"></i><h3>No past events yet</h3>
  </div>
</div>

<footer style="text-align:center;background:#0d47a1;color:rgba(255,255,255,.7);padding:1.5rem">
  &copy; 2026 SCSVMV University | <a href="admin/dashboard.html" style="color:var(--orange)">Admin</a>
</footer>

<script src="js/db.js"></script><script src="js/auth.js"></script><script src="js/script.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  let events = DB.getAll('events').filter(e => e.status === 'completed' && e.approved === 'true');
  const grid = document.getElementById('pastGrid');
  const empty = document.getElementById('emptyState');

  function render(q='') {
    let list = events.filter(e => !q || e.title.toLowerCase().includes(q.toLowerCase()));
    grid.innerHTML = list.map(ev => {
      const fbks = DB.getWhere('feedback', {event_id: ev.id});
      const avg = fbks.length ? (fbks.reduce((s,f)=>s+Number(f.rating),0)/fbks.length).toFixed(1) : null;
      return `<div class="event-card">
        <div class="event-image" style="background-image:url('${ev.image_url}')">
          <span class="event-category">${ev.category}</span>
          <span class="event-status-badge badge-completed">Completed</span>
        </div>
        <div class="event-content">
          <div class="event-title">${ev.title}</div>
          <div class="event-info"><i class="fas fa-calendar"></i>${fmtDate(ev.date)}</div>
          <div class="event-info"><i class="fas fa-map-marker-alt"></i>${ev.venue}</div>
          <div class="event-info"><i class="fas fa-users"></i>${ev.registered_count} participants</div>
          ${avg ? `<div class="event-info"><i class="fas fa-star" style="color:#f59e0b"></i>${avg}/5 rating (${fbks.length} reviews)</div>` : ''}
          <p class="event-desc">${ev.description.slice(0,100)}…</p>
          <div class="card-footer" style="margin-top:auto">
            <a href="event-details.html?id=${ev.id}" class="btn btn-outline btn-sm">Details & Reviews</a>
            <a href="participants.html?event=${ev.id}" class="btn btn-blue btn-sm"><i class="fas fa-users"></i> Participants</a>
          </div>
        </div>
      </div>`;
    }).join('');
    empty.style.display = list.length ? 'none' : 'block';
  }

  render();
  document.getElementById('searchInput').addEventListener('input', e => render(e.target.value));
});
</script>
</body></html>
